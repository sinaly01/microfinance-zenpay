# === APPLICATION ===
spring.application.name=microfinance-api
server.port=8080
server.shutdown=graceful

# === ORACLE DATABASE ===
# Correction de l'URL par défaut pour cibler le port local 1522 et le SID XE de Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1522:XE}
spring.datasource.username=SYSTEM
spring.datasource.password=oracle
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# === JPA / HIBERNATE ===
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# === JWT ===
jwt.secret=${JWT_SECRET:microfinance_secret_key_very_long_and_secure_2024_bceao}
jwt.expiration=${JWT_EXPIRATION:86400000}

# === CORS (accès depuis les machines clientes) ===
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://192.168.1.0/24,http://localhost}

# === SWAGGER ===
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# === EMAIL / SMTP Gmail ===
# Remplacer par vos vraies valeurs (Mot de passe d'application Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@zenpay.local}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
# Désactive l'envoi si pas de mot de passe configuré
spring.mail.test-connection=false

# === LOGGING ===
logging.level.com.microfinance=DEBUG
logging.level.org.springframework.security=INFO
